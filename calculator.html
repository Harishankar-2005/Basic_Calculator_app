<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="calc">
    <input  type="text" readonly id="screen">
    <div class="button">

      <button class="single_button" onclick="currentdisplay=``
      document.querySelector(`#screen`).value = currentdisplay";
      ><h1>C</h1></button>

      <button class="single_button shift" onclick="currentdisplay =currentdisplay + `1`
      document.querySelector(`#screen`).value = currentdisplay";
      ><h1>1</h1></button>

      <button class="single_button shift" onclick="currentdisplay =currentdisplay + `2`
      document.querySelector(`#screen`).value = currentdisplay";
      ><h1>2</h1></button>

    </div>
    <div class="button">
      <button class="single_button" onclick="currentdisplay =currentdisplay + `+`
      document.querySelector(`#screen`).value = currentdisplay";
      ><h1>+</h1></button>

      <button class="single_button shift" onclick="currentdisplay =currentdisplay + `3`
      document.querySelector(`#screen`).value = currentdisplay";
      ><h1>3</h1></button>

      <button class="single_button shift" onclick="currentdisplay =currentdisplay + `4`
      document.querySelector(`#screen`).value = currentdisplay";
      ><h1>4</h1></button>

    </div>
    <div class="button">
      <button class="single_button" onclick="currentdisplay =currentdisplay + `-`
      document.querySelector(`#screen`).value = currentdisplay";
      ><h1>-</h1></button>

      <button class="single_button shift" onclick="currentdisplay =currentdisplay + `5`
      document.querySelector(`#screen`).value = currentdisplay";
      ><h1>5</h1></button>

      <button class="single_button shift" onclick="currentdisplay =currentdisplay + `6`
      document.querySelector(`#screen`).value = currentdisplay";
      ><h1>6</h1></button>

    </div>
    <div class="button">
      <button class="single_button" onclick="currentdisplay =currentdisplay + `*`
      document.querySelector(`#screen`).value = currentdisplay";
      ><h1>*</h1></button>

      <button class="single_button shift" onclick="currentdisplay =currentdisplay + `7`
      document.querySelector(`#screen`).value = currentdisplay";
      ><h1>7</h1></button>

      <button class="single_button shift" onclick="currentdisplay =currentdisplay + `8`
      document.querySelector(`#screen`).value = currentdisplay";
      ><h1>8</h1></button>

    </div>
    <div class="button">
      <button class="single_button" onclick="currentdisplay =currentdisplay + `/`
      document.querySelector(`#screen`).value = currentdisplay";
      ><h1>/</h1></button>

      <button class="single_button shift" onclick="finalValue=eval(currentdisplay)
      document.querySelector(`#screen`).value = finalValue";><h1>=</h1></button>

      <button class="single_button shift" onclick="currentdisplay =currentdisplay + `9`
      document.querySelector(`#screen`).value = currentdisplay";
      ><h1>9</h1></button>

    </div>
    <div class="button">
      <button class="single_button" id="last_row" onclick="currentdisplay =currentdisplay + `0`
      document.querySelector(`#screen`).value = currentdisplay";
      ><h1>0</h1></button>

      <button class="single_button shift" onclick="currentdisplay =currentdisplay + `.`
      document.querySelector(`#screen`).value = currentdisplay";
      ><h1>.</h1></button>

    </div>
  </div>


  <script>
    let currentdisplay =``;
    document.querySelector(`#screen`).value = currentdisplay;
    let finalValue=``;
  </script>
</body>
</html>
