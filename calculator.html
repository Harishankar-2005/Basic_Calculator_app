<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="calc">
    <input  type="text" readonly id="screen">
    <div class="button">

      <button class="single_button color" onclick="currentdisplay=``
      document.querySelector(`#screen`).value = currentdisplay";
      ><h1>C</h1></button>

      <button class="single_button shift" onclick="addValue(1)";
      ><h1>1</h1></button>

      <button class="single_button shift" onclick="addValue(2)";
      ><h1>2</h1></button>

    </div>
    <div class="button">
      <button class="single_button color" onclick="addValue(`+`)";
      ><h1>&plus;</h1></button>

      <button class="single_button shift" onclick="addValue(3)";
      ><h1>3</h1></button>

      <button class="single_button shift" onclick="addValue(4)";
      ><h1>4</h1></button>

    </div>
    <div class="button">
      <button class="single_button color" onclick="addValue(`-`)";
      ><h1>&minus;</h1></button>

      <button class="single_button shift" onclick="addValue(5)";
      ><h1>5</h1></button>

      <button class="single_button shift" onclick="addValue(6)";
      ><h1>6</h1></button>

    </div>
    <div class="button">
      <button class="single_button color" onclick="addValue(`×`)";
      ><h1>&times;</h1></button>

      <button class="single_button shift" onclick="addValue(7)";
      ><h1>7</h1></button>

      <button class="single_button shift" onclick="addValue(8)";
      ><h1>8</h1></button>

    </div>
    <div class="button">
      <button class="single_button color" onclick="addValue(`÷`)";
      ><h1>&divide;</h1></button>

      <button class="single_button shift color" onclick="result()"><h1>&equals;</h1></button>

      <button class="single_button shift" onclick="addValue(9)";
      ><h1>9</h1></button>

    </div>
    <div class="button">
      <button class="single_button" id="last_row" onclick="addValue(0)";
      ><h1>0</h1></button>

      <button class="single_button shift" onclick="addValue(`.`)";
      ><h1>.</h1></button>

    </div>
  </div>


  <script>
    let currentdisplay =``;
    document.querySelector(`#screen`).value = currentdisplay;
    let finalValue=``;
    
    function addValue(value) {
      let lastchar=currentdisplay[currentdisplay.length - 1];
      let symbol = [`+`,`-`,`×`,`÷`,`*`,`/`];

      if (symbol.includes(lastchar) && symbol.includes(value)) {
        return;
      } else{
        currentdisplay += value;
        document.querySelector(`#screen`).value = currentdisplay;
      }

    }

    function result() {
      currentdisplay = currentdisplay.replace(/×/g,`*`);
      currentdisplay = currentdisplay.replace(/÷/g,`/`);
      finalValue=eval(currentdisplay)
      document.querySelector(`#screen`).value = finalValue;
    }
  </script>
</body>
</html>
